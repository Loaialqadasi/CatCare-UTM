name: Keep-Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render cold starts
    - cron: '*/14 * * * *'

jobs:
  keepalive:
    name: Keep-Alive Ping
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS https://catcare-backend.onrender.com/api/health || exit 1
